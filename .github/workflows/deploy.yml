name: Deploy to GitHub Pages

# main に push されたら自動でビルドして GitHub Pages へ公開する。
# （従来の「dist を手で gh-pages に push」運用を置き換える）
on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ（古いデプロイは打ち切る）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build # vite が base=/tera-app/ で dist/ を生成
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
