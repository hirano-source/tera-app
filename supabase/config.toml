# Supabase ローカル設定（主に Edge Functions のデプロイ用）。
# project_id は `supabase link` で結びつけるプロジェクト参照。
project_id = "rjxfleeyntqusuoqzclw"

# ホスト版MCP関数。
# verify_jwt=false は必須：未認証の発見(/.well-known)・DCR(/register)・
# 認可(/authorize)・トークン(/token) と、Supabase以外の自前Bearerでの /mcp 呼び出しを
# プラットフォームのJWTゲートに弾かせないため。認可は関数内のOAuthで自前に行う。
[functions.mcp]
verify_jwt = false

# 文字起こし（Whisper等STT）プロキシ。verify_jwt=false にして CORS プリフライト(OPTIONS)を
# 関数で処理しつつ、本体では Bearer のユーザーJWTを getUser で自前検証する。
[functions.transcribe]
verify_jwt = false

# 要約（LLM）。文字起こしの生テキストを議事録に整形。transcribeと同じGroqキーで動く。
[functions.summarize]
verify_jwt = false
